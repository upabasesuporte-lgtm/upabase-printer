<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cardápio Digital</title>

    <!-- SEO básico -->
    <meta name="description" content="Veja nosso cardápio, escolha seus itens e faça seu pedido online." />

    <!-- Open Graph — WhatsApp, Facebook, etc. usam estas tags para gerar o preview do link -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Cardápio Digital" />
    <meta property="og:title"       content="Cardápio Digital" />
    <meta property="og:description" content="Veja nosso cardápio, escolha seus itens e faça seu pedido online." />
    <meta property="og:image"       content="/og-image.svg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Cardápio Digital" />
    <meta name="twitter:description" content="Veja nosso cardápio, escolha seus itens e faça seu pedido online." />
    <meta name="twitter:image"       content="/og-image.svg" />

    <script>localStorage.removeItem('app-theme');</script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

</html>
